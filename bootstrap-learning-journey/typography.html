<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Typography</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
  
<h3>Typograpghy in Bootstrap</h3>
    <h1>Heading in Paragraphs:</h1>
    <p class="h1">H1</p>
    <p class="h2">H2</p>
    <p class="h3">H3</p>
    <p class="h4">H4</p>
    <p class="h5">H5</p>
    <p class="h6">H6</p>


    <h1>Display Text in Bootstrap:</h1>
    <p class="display-1">Display Text</p>
    <p class="display-2">Display Text</p>
    <p class="display-3">Display Text</p>
    <p class="display-4">Display Text</p>
    <p class="display-5">Display Text</p>
    <p class="display-6">Display Text</p>
  </body>
</html>
