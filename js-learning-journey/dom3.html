<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM</title>
  </head>
  <style>
    .div {
      background-color: red;
      height: 100px;
      width: 100px;
    }
    .widthmax {
      height: 300px;
      width: 300px;
      border-radius: 50%;
      transition: 2s;
    }
  </style>
  <body>
    <div class="div" id="box"></div>
    <button onclick="change()">Change</button>
    <script>
      var box = document.getElementById("box");

      function change() {
        box.style.backgroundColor = "blue";
        box.setAttribute("class", "widthmax");
      }
    </script>
  </body>
</html>
