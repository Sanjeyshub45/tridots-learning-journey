<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM</title>
  </head>
  <body>
    <h1 id="content"></h1>
    <button onclick="change(event)">Max</button>
    <button onclick="change(event)">Will</button>
    <button onclick="change(event)">Jonathan</button>
    <script>
      var content = document.getElementById("content");
      function change(event) {
        content.textContent = event.target.textContent;
      }
    </script>
  </body>
</html>
