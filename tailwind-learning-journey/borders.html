<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Borders in Tailwind CSS</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <h2 class="text-5xl border-8 border-amber-500 m-4">Border</h2>
    <h2 class="text-5xl border-l-8 m-4">Border Left</h2>
    <h2 class="text-5xl border-r-8 m-4">Border Right</h2>
    <h2 class="text-5xl border-t-8 m-4">Border Top</h2>
    <h2 class="text-5xl border-b-8 m-4">Border Bottom</h2>
    <h2 class="text-5xl border-b-8 m-4">Border Bottom</h2>

    <h2 class="border-solid text-5xl border-8">Solid</h2>

    <h2 class="border-dashed text-5xl border-8">Dashed</h2>

    <h2 class="border-dotted text-5xl border-8">Dotted</h2>
    <br />
    <h2 class="rounded-lg border-8 m-20 border-double">Rounded Border</h2>





  </body>
</html>
