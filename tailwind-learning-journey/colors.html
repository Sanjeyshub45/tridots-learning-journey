<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Colors in Tailwind</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <!-- colors -->
    <p class="text-red-500">Defined Colors</p>

    <!-- customized colors -->
     <!-- 1.hex value -->
    <p class="text-[#BA67A0]">Custom(hex) Colors</p>
    <!-- 2.rgb -->
     <p class="text-[rgb(204,153,255)]">Custom(rgb) Colors</p>

     <!-- background colors -->
      <div class="bg-amber-400">
            <p class="text-red-500">DIV BG COLORS</p>
      </div>



  </body>
</html>
