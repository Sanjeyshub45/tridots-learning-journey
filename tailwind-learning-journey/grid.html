<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid in Tailwind CSS</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div class="grid grid-cols-3 gap-3 m-4">
      <div class="bg-amber-200 h-30">COL</div>
      <div class="bg-amber-200">COL</div>
      <div class="bg-amber-200">COL</div>
      <div class="bg-amber-200 h-30">COL</div>
      <div class="bg-amber-200">COL</div>
      <div class="bg-amber-200">COL</div>
    </div>

    <div class="grid grid-rows-3">
      <div class="bg-amber-200 p-2 m-2">ROW</div>
      <div class="bg-amber-200 p-2 m-2">ROW</div>
      <div class="bg-amber-200 p-2 m-2">ROW</div>
    </div>

    <div class="grid grid-cols-3 gap-3 m-4">
      <div class="bg-amber-200 row-span-2">COL</div>
      <div class="bg-amber-200">COL</div>
      <div class="bg-amber-200">COL</div>
      <div class="bg-amber-200 col-span-2">COL</div>
      <div class="bg-amber-200">COL</div>
      <div class="bg-amber-200">COL</div>
    </div>

    <div class="grid md:grid-cols-3 sm:grid-cols-2 lg:grid-cols-4 grid-cols-1">
      <div class="bg-amber-300 m-2">ONE</div>
      <div class="bg-amber-300 m-2">TWO</div>
      <div class="bg-amber-300 m-2">THREE</div>
      <div class="bg-amber-300 m-2">FOUR</div>
      <div class="bg-amber-300 m-2">FIVE</div>
      <div class="bg-amber-300 m-2">SIX</div>
    </div>

    <div class="grid grid-cols-5">
      <div class="col-span-1 bg-amber-500 h-100">Navigation</div>
      <div class="col-span-4 bg-amber-700 h-100">Content</div>
    </div>

    <div class="grid grid-rows-2">
      <div class="bg-amber-800 h-96"></div>
      <div class="bg-amber-950 h-96"></div>
    </div>
  </body>
</html>
